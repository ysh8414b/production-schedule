<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        background: #fff;
        padding: 30px 40px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 3px solid #222;
        padding-bottom: 12px;
        margin-bottom: 24px;
      }
      .header-title {
        font-size: 2.2em;
        font-weight: 900;
        color: #111;
        text-decoration: underline;
        text-underline-offset: 6px;
      }
      .header-total {
        font-size: 2.6em;
        font-weight: 900;
        color: #d00;
      }
      .header-total span { font-size: 1.1em; }

      .content {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 30px;
        align-items: start;
      }

      /* 왼쪽: 단일 파렛트 요약 */
      .summary-section { padding-right: 20px; }
      .summary-group { margin-bottom: 28px; }
      .summary-range {
        font-size: 1.5em;
        font-weight: 900;
        color: #222;
        margin-bottom: 4px;
      }
      .summary-product {
        font-size: 1.4em;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .summary-info {
        font-size: 1.15em;
        font-weight: 700;
      }

      /* 오른쪽: 혼합 파렛트 그리드 */
      .mixed-section {}
      .pallet-block { margin-bottom: 24px; }
      .pallet-header {
        font-size: 1.5em;
        font-weight: 900;
        color: #222;
        margin-bottom: 6px;
      }
      .pallet-grid {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        grid-template-rows: repeat(2, 120px);
        border: 2px solid #888;
        border-radius: 6px;
        overflow: hidden;
        width: fit-content;
      }
      .grid-cell {
        border: 1px solid #ccc;
        text-align: center;
        padding: 6px 4px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: #fff;
      }
      .grid-cell.empty { background: #fafafa; }
      .cell-product {
        font-size: 1.1em;
        font-weight: 700;
      }
      .cell-count {
        font-size: 1.0em;
        font-weight: 700;
      }

      /* 2제품 분할 셀 */
      .split-cell {
        display: flex;
        flex-direction: column;
        padding: 0;
      }
      .split-half {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 6px 4px;
      }
      .split-half + .split-half {
        border-top: 1px dashed #ccc;
      }
      .split-name {
        font-size: 0.9em;
        font-weight: 700;
      }
      .split-count {
        font-size: 0.85em;
        font-weight: 700;
      }
    </style>
    
</head>
<body>
